  <rect y="346" width="600" height="94" fill="#E7D6BF"/>
  <rect y="338" width="600" height="10" fill="#F5F1E9"/>

  <!-- house -->
  <ellipse cx="300" cy="352" rx="220" ry="14" fill="#000" opacity="0.05"/>
  <rect x="160" y="190" width="280" height="156" fill="#FFFFFF" stroke="#E2E2DA" stroke-width="2"/>
  <polygon points="140,192 300,96 460,192" fill="#28344A"/>
  <polygon points="300,96 460,192 430,192 300,118" fill="#1F2A3C"/>
