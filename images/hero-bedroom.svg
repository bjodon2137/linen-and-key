<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" role="img" aria-label="A freshly made bed with crisp white and grey linens in a bright, modern short-term rental bedroom with morning light from a window">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3EDE1"/>
      <stop offset="1" stop-color="#ECE4D4"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFBF0" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFBF0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="duvet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EFEFE9"/>
    </linearGradient>
  </defs>

  <!-- wall + floor -->
  <rect width="1000" height="700" fill="url(#wall)"/>
  <rect y="548" width="1000" height="152" fill="#E7D6BF"/>
  <rect y="536" width="1000" height="14" fill="#F5F1E9"/>
  <g stroke="#D9C5A8" stroke-width="2">
    <line x1="120" y1="550" x2="120" y2="700"/>
    <line x1="270" y1="550" x2="270" y2="700"/>
    <line x1="430" y1="550" x2="430" y2="700"/>
    <line x1="600" y1="550" x2="600" y2="700"/>
    <line x1="770" y1="550" x2="770" y2="700"/>
    <line x1="910" y1="550" x2="910" y2="700"/>
  </g>

  <!-- light beams from window -->
  <polygon points="95,120 250,120 470,560 200,560" fill="url(#beam)"/>

  <!-- window -->
  <g>
    <rect x="74" y="92" width="208" height="270" rx="6" fill="#FFFFFF"/>
    <rect x="84" y="102" width="188" height="250" fill="#E6EEF0"/>
    <rect x="84" y="102" width="188" height="125" fill="#EDF3F4"/>
    <g stroke="#1F2A3C" fill="none" stroke-width="7">
      <rect x="74" y="92" width="208" height="270" rx="6"/>
      <line x1="178" y1="102" x2="178" y2="352"/>
      <line x1="84" y1="227" x2="272" y2="227"/>
    </g>
    <rect x="64" y="362" width="228" height="16" rx="4" fill="#F5F1E9" stroke="#D9C5A8" stroke-width="1.5"/>
  </g>
  <!-- sparkle -->
  <path d="M318 70 L324 92 L346 98 L324 104 L318 126 L312 104 L290 98 L312 92 Z" fill="#B79268"/>

  <!-- nightstand + plant -->
  <g>
    <rect x="300" y="412" width="108" height="128" rx="6" fill="#C8A87E"/>
    <rect x="300" y="412" width="108" height="128" rx="6" fill="none" stroke="#B2926A" stroke-width="2"/>
    <line x1="312" y1="470" x2="396" y2="470" stroke="#B2926A" stroke-width="2"/>
    <circle cx="354" cy="455" r="3" fill="#1F2A3C"/>
    <!-- pot -->
    <path d="M330 366 L378 366 L372 412 L336 412 Z" fill="#B79268"/>
    <!-- foliage -->
    <g fill="#9AA886">
      <ellipse cx="354" cy="338" rx="11" ry="26" transform="rotate(-6 354 338)"/>
      <ellipse cx="334" cy="346" rx="10" ry="22" transform="rotate(-32 334 346)"/>
      <ellipse cx="374" cy="346" rx="10" ry="22" transform="rotate(30 374 346)"/>
    </g>
    <g fill="#86977A">
      <ellipse cx="344" cy="350" rx="7" ry="16" transform="rotate(-18 344 350)"/>
      <ellipse cx="364" cy="350" rx="7" ry="16" transform="rotate(16 364 350)"/>
    </g>
  </g>

  <!-- bed shadow -->
  <ellipse cx="690" cy="560" rx="320" ry="26" fill="#000000" opacity="0.06"/>

  <!-- headboard -->
  <rect x="430" y="150" width="510" height="210" rx="16" fill="#28344A"/>
  <g stroke="#36425A" stroke-width="3">
    <line x1="520" y1="170" x2="520" y2="330"/>
    <line x1="610" y1="170" x2="610" y2="330"/>
    <line x1="700" y1="170" x2="700" y2="330"/>
    <line x1="790" y1="170" x2="790" y2="330"/>
    <line x1="855" y1="170" x2="855" y2="330"/>
  </g>

  <!-- mattress / duvet -->
  <rect x="406" y="356" width="556" height="196" rx="22" fill="url(#duvet)"/>
  <rect x="406" y="356" width="556" height="196" rx="22" fill="none" stroke="#E2E2DA" stroke-width="2"/>
  <!-- folded throw (sage) -->
  <rect x="406" y="468" width="556" height="44" fill="#9AA886"/>
  <rect x="406" y="468" width="556" height="10" fill="#A8B596"/>

  <!-- pillows -->
  <g>
    <rect x="452" y="300" width="210" height="84" rx="20" fill="#FCFCFA" stroke="#E5E5DD" stroke-width="2"/>
    <rect x="690" y="300" width="210" height="84" rx="20" fill="#FCFCFA" stroke="#E5E5DD" stroke-width="2"/>
    <!-- accent lumbar pillow with key motif -->
    <rect x="600" y="338" width="150" height="58" rx="14" fill="#1F2A3C"/>
    <g fill="none" stroke="#B79268" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" transform="translate(648,350) scale(0.9)">
      <circle cx="10" cy="10" r="7"/>
      <line x1="10" y1="17" x2="10" y2="34"/>
      <line x1="10" y1="27" x2="18" y2="27"/>
    </g>
  </g>
</svg>
