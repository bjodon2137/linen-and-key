<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#28344A"/><stop offset="1" stop-color="#1F2A3C"/>
    </linearGradient>
    <radialGradient id="g" cx="0.5" cy="0.30" r="0.62">
      <stop offset="0" stop-color="#B79268" stop-opacity="0.26"/><stop offset="1" stop-color="#B79268" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="720" height="720" fill="url(#bg)"/>
  <rect width="720" height="720" fill="url(#g)"/>
  <circle cx="360" cy="360" r="300" fill="none" stroke="#3a475f" stroke-width="2" opacity="0.55"/>

  <!-- key + sparkle mark, centered, upper -->
  <g transform="translate(360,250)">
    <g fill="none" stroke="#F5F1E9" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="-46" r="46"/>
      <circle cx="0" cy="-46" r="16" fill="#F5F1E9" stroke="none"/>
      <line x1="0" y1="0" x2="0" y2="140"/>
      <line x1="0" y1="92" x2="42" y2="92"/>
      <line x1="0" y1="122" x2="32" y2="122"/>
    </g>
    <path d="M82 -92 l11 35 l35 11 l-35 11 l-11 35 l-11 -35 l-35 -11 l35 -11 z" fill="#C8A578"/>
  </g>

  <!-- sans wordmark (legible at small / circular crops) -->
  <text x="360" y="500" text-anchor="middle" font-family="'Inter', Arial, Helvetica, sans-serif" font-size="50" font-weight="700" letter-spacing="3" fill="#F5F1E9">LINEN <tspan fill="#C8A578">&amp;</tspan> KEY</text>
  <text x="360" y="542" text-anchor="middle" font-family="'Inter', Arial, Helvetica, sans-serif" font-size="19" letter-spacing="3" fill="#aeb6c2">AKRON · SUMMIT COUNTY, OH</text>
</svg>
