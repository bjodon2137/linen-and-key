<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#28344A"/><stop offset="1" stop-color="#1F2A3C"/>
    </linearGradient>
    <radialGradient id="g" cx="0.82" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#B79268" stop-opacity="0.30"/><stop offset="1" stop-color="#B79268" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#g)"/>
  <rect x="60" y="60" width="960" height="960" rx="28" fill="none" stroke="#3a475f" stroke-width="2"/>

  <!-- key mark + brand -->
  <g transform="translate(120,140)">
    <g fill="none" stroke="#F5F1E9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="26" cy="30" r="22"/><circle cx="26" cy="30" r="7.5" fill="#F5F1E9" stroke="none"/>
      <line x1="26" y1="52" x2="26" y2="118"/><line x1="26" y1="92" x2="48" y2="92"/>
    </g>
    <path d="M70 8 l6 18 l18 6 l-18 6 l-6 18 l-6 -18 l-18 -6 l18 -6 z" fill="#C8A578"/>
    <text x="118" y="58" font-family="'Cormorant Garamond', Georgia, serif" font-size="56" font-weight="700" fill="#F5F1E9">Linen <tspan fill="#C8A578">&amp;</tspan> Key</text>
  </g>

  <text x="120" y="430" font-family="'Inter', Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="6" fill="#C8A578">FOUNDING CLIENT OFFER</text>

  <text x="116" y="560" font-family="'Cormorant Garamond', Georgia, serif" font-size="150" font-weight="700" fill="#F5F1E9">20% off</text>
  <text x="120" y="650" font-family="'Cormorant Garamond', Georgia, serif" font-size="78" font-weight="600" fill="#F5F1E9">your first clean</text>

  <text x="120" y="730" font-family="'Inter', Arial, sans-serif" font-size="30" fill="#c7cdd7">Airbnb turnovers &amp; home cleaning — Summit County, OH</text>

  <!-- divider -->
  <line x1="120" y1="780" x2="960" y2="780" stroke="#3a475f" stroke-width="2"/>

  <text x="120" y="840" font-family="'Inter', Arial, sans-serif" font-size="30" fill="#aeb6c2">Limited to our first 10 clients — be one of them.</text>

  <!-- CTA pill -->
  <rect x="120" y="888" width="430" height="84" rx="42" fill="#B79268"/>
  <text x="335" y="940" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">linenkey.com</text>
</svg>
